<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grid</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    max-width: 390px;
    margin: 0 auto;
    min-height: 100vh;
  }

  /* ── Age gate ── */
  #gate {
    position: fixed;
    inset: 0;
    background: #fff;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 32px;
  }

  .gate-card {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  .gate-icon {
    width: 56px;
    height: 56px;
    background: #f2f2f2;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .gate-icon svg {
    width: 26px;
    height: 26px;
    stroke: #555;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .gate-text {
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .gate-text h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.4px;
    color: #111;
  }

  .gate-text p {
    font-size: 14px;
    color: #888;
    line-height: 1.5;
  }

  .gate-checkbox-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    width: 100%;
    cursor: pointer;
  }

  .gate-checkbox-row input[type="checkbox"] {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    margin-top: 1px;
    accent-color: #111;
    cursor: pointer;
  }

  .gate-checkbox-row label {
    font-size: 14px;
    color: #444;
    line-height: 1.5;
    cursor: pointer;
  }

  .gate-btn {
    width: 100%;
    padding: 15px;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.2px;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .gate-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .gate-btn:not(:disabled):active { opacity: 0.75; }

  .gate-error {
    font-size: 12px;
    color: #c0392b;
    text-align: center;
    min-height: 16px;
  }

  /* ── App ── */
  #app { display: none; }

  .feed {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .row { display: flex; gap: 14px; }

  .tile {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #e8e8e8;
    border-radius: 12px;
  }

  .tile video {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Placeholder shown while src not yet set */
  .tile .placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #ebebeb;
  }

  .tile .placeholder svg {
    width: 28px;
    height: 28px;
    stroke: #bbb;
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .row.single .tile { height: 320px; }
  .row.double .tile { height: 220px; }
  .row.double .tile.tall { height: 260px; align-self: flex-start; }

  /* Slot number label */
  .slot-label {
    position: absolute;
    bottom: 9px;
    left: 9px;
    font-size: 10px;
    font-weight: 600;
    color: rgba(255,255,255,0.75);
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    pointer-events: none;
  }

  /* ── Video player overlay ── */
  .player-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    cursor: pointer;
    background: linear-gradient(to top, rgba(0,0,0,0.45) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .tile:hover .player-overlay,
  .tile.controls-visible .player-overlay {
    opacity: 1;
  }

  .player-controls {
    padding: 8px 10px 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .player-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .btn-playpause {
    width: 32px;
    height: 32px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    border: none;
    cursor: pointer;
    flex-shrink: 0;
  }

  .btn-playpause svg {
    width: 14px;
    height: 14px;
    fill: #fff;
    stroke: none;
  }

  .time-label {
    font-size: 10px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.04em;
  }

  /* Progress bar */
  .progress-wrap {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.3);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: #fff;
    border-radius: 2px;
    width: 0%;
    pointer-events: none;
  }

  /* ── Lightbox carousel ── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 200;
    touch-action: pan-y;
  }

  #lightbox.open { display: flex; align-items: center; }

  .lb-track {
    display: flex;
    width: 100%;
    height: 100%;
    transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .lb-slide {
    flex: 0 0 100%;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .lb-slide video {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .lb-close {
    position: fixed;
    top: 18px;
    right: 18px;
    z-index: 210;
    width: 36px;
    height: 36px;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(6px);
  }

  .lb-close svg {
    width: 16px;
    height: 16px;
    stroke: #fff;
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
  }

  .lb-counter {
    position: fixed;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.04em;
    z-index: 210;
    pointer-events: none;
  }

  /* Lightbox player controls */
  .lb-controls {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 210;
    padding: 12px 20px 40px;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
    display: flex;
    flex-direction: column;
    gap: 10px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  #lightbox.show-controls .lb-controls { opacity: 1; }

  .lb-controls-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .lb-playpause {
    width: 44px;
    height: 44px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: none;
    backdrop-filter: blur(4px);
  }

  .lb-playpause svg { width: 18px; height: 18px; fill: #fff; }

  .lb-time {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.8);
    letter-spacing: 0.04em;
  }

  .lb-progress-wrap {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
    cursor: pointer;
  }

  .lb-progress-fill {
    height: 100%;
    background: #fff;
    border-radius: 2px;
    width: 0%;
    pointer-events: none;
  }

</style>
</head>
<body>

<!-- Background music -->
<audio id="bgMusic" src="audio/music.mp3" loop preload="none"></audio>

<!-- Age gate -->
<div id="gate">
  <div class="gate-card">
    <div class="gate-icon">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    <div class="gate-text">
      <h1>Age Verification</h1>
      <p>This content is intended for adults only. Please confirm your age before continuing.</p>
    </div>
    <label class="gate-checkbox-row">
      <input type="checkbox" id="ageCheck">
      <label for="ageCheck">I confirm that I am 18 years of age or older</label>
    </label>
    <div class="gate-error" id="gateError"></div>
    <button class="gate-btn" id="gateBtn" disabled>Enter</button>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <div class="lb-track" id="lbTrack"></div>
  <div class="lb-close" id="lbClose">
    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </div>
  <div class="lb-counter" id="lbCounter"></div>
  <div class="lb-controls" id="lbControlsBar">
    <div class="lb-controls-top">
      <button class="lb-playpause" id="lbPlayBtn">
        <svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <span class="lb-time" id="lbTime">0:00</span>
    </div>
    <div class="lb-progress-wrap" id="lbProgressWrap">
      <div class="lb-progress-fill" id="lbProgressFill"></div>
    </div>
  </div>
</div>

<!-- Main app -->
<div id="app">
  <div class="feed" id="feed"></div>
</div>

<script>
  /* ── Age gate ── */
  const check = document.getElementById('ageCheck');
  const btn   = document.getElementById('gateBtn');
  const err   = document.getElementById('gateError');

  check.addEventListener('change', () => {
    btn.disabled = !check.checked;
    err.textContent = '';
  });

  btn.addEventListener('click', () => {
    if (!check.checked) { err.textContent = 'Please confirm you are 18 or older.'; return; }
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('bgMusic').play().catch(() => {});
  });

  /* ── Video sources ── */
  const SRCS = [
    /* 001 */ 'https://res.cloudinary.com/dw5ovtiwp/video/upload/v1780428434/%D0%BF%D0%B0%D1%86_%D0%B7%D0%B0%D0%BC%D1%96%D0%BD%D0%B0_1_dez4xy.mov',
    /* 002 */ 'https://res.cloudinary.com/dw5ovtiwp/video/upload/v1780434018/%D0%BF%D0%B0%D1%86_%D0%B7%D0%B0%D0%BC%D1%96%D0%BD%D0%B0_2_xvrh5w.mov',
    /* 003 */ '',
    /* 004 */ '',
    /* 005 */ '',
    /* 006 */ '',
    /* 007 */ '',
    /* 008 */ '',
    /* 009 */ '',
    /* 010 */ '',
    /* 011 */ '',
    /* 012 */ '',
    /* 013 */ '',
    /* 014 */ '',
    /* 015 */ '',
    /* 016 */ '',
    /* 017 */ '',
    /* 018 */ '',
    /* 019 */ '',
    /* 020 */ '',
    /* 021 */ '',
    /* 022 */ '',
    /* 023 */ '',
    /* 024 */ '',
    /* 025 */ '',
    /* 026 */ '',
    /* 027 */ '',
    /* 028 */ '',
    /* 029 */ '',
    /* 030 */ '',
    /* 031 */ '',
    /* 032 */ '',
    /* 033 */ '',
    /* 034 */ '',
    /* 035 */ '',
    /* 036 */ '',
    /* 037 */ '',
    /* 038 */ '',
    /* 039 */ '',
    /* 040 */ '',
    /* 041 */ '',
    /* 042 */ '',
    /* 043 */ '',
    /* 044 */ '',
    /* 045 */ '',
    /* 046 */ '',
    /* 047 */ '',
    /* 048 */ '',
    /* 049 */ '',
    /* 050 */ '',
    /* 051 */ '',
    /* 052 */ '',
    /* 053 */ '',
    /* 054 */ '',
    /* 055 */ '',
    /* 056 */ '',
    /* 057 */ '',
    /* 058 */ '',
    /* 059 */ '',
    /* 060 */ '',
    /* 061 */ '',
    /* 062 */ '',
    /* 063 */ '',
    /* 064 */ '',
    /* 065 */ '',
    /* 066 */ '',
    /* 067 */ '',
    /* 068 */ '',
    /* 069 */ '',
    /* 070 */ '',
    /* 071 */ '',
    /* 072 */ '',
    /* 073 */ '',
    /* 074 */ '',
    /* 075 */ '',
    /* 076 */ '',
    /* 077 */ '',
    /* 078 */ '',
    /* 079 */ '',
    /* 080 */ '',
    /* 081 */ '',
    /* 082 */ '',
    /* 083 */ '',
    /* 084 */ '',
    /* 085 */ '',
    /* 086 */ '',
    /* 087 */ '',
    /* 088 */ '',
    /* 089 */ '',
    /* 090 */ '',
    /* 091 */ '',
    /* 092 */ '',
    /* 093 */ '',
    /* 094 */ '',
    /* 095 */ '',
    /* 096 */ '',
    /* 097 */ '',
    /* 098 */ '',
    /* 099 */ '',
  ];

  // Only filled slots go into carousel
  const filledSrcs = SRCS.map((s, i) => ({ src: s, index: i })).filter(x => x.src);

  /* ── Lightbox ── */
  const lightbox   = document.getElementById('lightbox');
  const lbTrack    = document.getElementById('lbTrack');
  const lbClose    = document.getElementById('lbClose');
  const lbCounter  = document.getElementById('lbCounter');
  const lbPlayBtn  = document.getElementById('lbPlayBtn');
  const lbTime     = document.getElementById('lbTime');
  const lbProgressWrap = document.getElementById('lbProgressWrap');
  const lbProgressFill = document.getElementById('lbProgressFill');
  const lbControlsBar  = document.getElementById('lbControlsBar');

  let lbIndex = 0;
  let lbVids = [];
  let lbHideTimer;

  // Build slides once
  filledSrcs.forEach(({ src }) => {
    const slide = document.createElement('div');
    slide.className = 'lb-slide';
    const vid = document.createElement('video');
    vid.src = src;
    vid.loop = true;
    vid.muted = true;
    vid.playsInline = true;
    vid.preload = 'none';
    slide.appendChild(vid);
    lbTrack.appendChild(slide);
    lbVids.push(vid);
  });

  function lbCurrentVid() { return lbVids[lbIndex]; }

  function lbGoTo(idx, animate = true) {
    lbIndex = Math.max(0, Math.min(idx, filledSrcs.length - 1));
    lbTrack.style.transition = animate ? 'transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94)' : 'none';
    lbTrack.style.transform = `translateX(-${lbIndex * 100}%)`;
    lbCounter.textContent = `${lbIndex + 1} / ${filledSrcs.length}`;
    // Pause all, play current
    lbVids.forEach((v, i) => { if (i !== lbIndex) v.pause(); });
    const cur = lbCurrentVid();
    cur.play().catch(() => {});
    lbUpdateControls();
  }

  function lbUpdateControls() {
    const cur = lbCurrentVid();
    lbPlayBtn.innerHTML = cur.paused
      ? `<svg viewBox="0 0 24 24" fill="#fff"><polygon points="5 3 19 12 5 21 5 3"/></svg>`
      : `<svg viewBox="0 0 24 24" fill="#fff"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;
  }

  function lbShowControls() {
    lightbox.classList.add('show-controls');
    clearTimeout(lbHideTimer);
    lbHideTimer = setTimeout(() => lightbox.classList.remove('show-controls'), 2500);
  }

  function openLightbox(filledIdx) {
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
    lbGoTo(filledIdx, false);
    lbShowControls();
  }

  function closeLightbox() {
    lbVids.forEach(v => v.pause());
    lightbox.classList.remove('open');
    lightbox.classList.remove('show-controls');
    document.body.style.overflow = '';
  }

  lbClose.addEventListener('click', closeLightbox);

  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox || e.target.tagName === 'VIDEO') lbShowControls();
  });

  lbPlayBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const cur = lbCurrentVid();
    cur.paused ? cur.play() : cur.pause();
    lbUpdateControls();
    lbShowControls();
  });

  // Progress update
  lbVids.forEach((vid) => {
    vid.addEventListener('timeupdate', () => {
      if (vid !== lbCurrentVid() || !vid.duration) return;
      lbProgressFill.style.width = (vid.currentTime / vid.duration * 100) + '%';
      const s = Math.floor(vid.currentTime);
      lbTime.textContent = Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
    });
  });

  lbProgressWrap.addEventListener('click', (e) => {
    e.stopPropagation();
    const cur = lbCurrentVid();
    if (!cur.duration) return;
    const rect = lbProgressWrap.getBoundingClientRect();
    cur.currentTime = ((e.clientX - rect.left) / rect.width) * cur.duration;
    lbShowControls();
  });

  /* ── Swipe ── */
  let swipeStartX = 0, swipeStartY = 0, swipeDx = 0, isHorizontal = null;

  lightbox.addEventListener('touchstart', (e) => {
    swipeStartX = e.touches[0].clientX;
    swipeStartY = e.touches[0].clientY;
    swipeDx = 0;
    isHorizontal = null;
    lbTrack.style.transition = 'none';
  }, { passive: true });

  lightbox.addEventListener('touchmove', (e) => {
    const dx = e.touches[0].clientX - swipeStartX;
    const dy = e.touches[0].clientY - swipeStartY;

    if (isHorizontal === null) {
      if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
        isHorizontal = Math.abs(dx) > Math.abs(dy);
      }
    }

    if (isHorizontal) {
      e.preventDefault();
      swipeDx = dx;
      const base = lbIndex * 100;
      const offset = (swipeDx / window.innerWidth) * 100;
      lbTrack.style.transform = `translateX(calc(-${base}% + ${swipeDx}px))`;
    }
  }, { passive: false });

  lightbox.addEventListener('touchend', () => {
    if (isHorizontal) {
      if (swipeDx < -50 && lbIndex < filledSrcs.length - 1) {
        lbGoTo(lbIndex + 1);
      } else if (swipeDx > 50 && lbIndex > 0) {
        lbGoTo(lbIndex - 1);
      } else {
        // Snap back
        lbTrack.style.transition = 'transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94)';
        lbTrack.style.transform = `translateX(-${lbIndex * 100}%)`;
      }
    } else {
      lbShowControls();
    }
    isHorizontal = null;
    swipeDx = 0;
  });

  /* ── Grid ── */
  const order = [...Array(99).keys()];

  function makeTile(slotIndex) {
    const src = SRCS[slotIndex];
    const div = document.createElement('div');
    div.className = 'tile';

    if (src) {
      // Find index in filledSrcs for lightbox
      const filledIdx = filledSrcs.findIndex(x => x.index === slotIndex);

      const thumb = document.createElement('video');
      thumb.src = src;
      thumb.muted = true;
      thumb.loop = true;
      thumb.playsInline = true;
      thumb.preload = 'none';
      div.appendChild(thumb);

      // Big play button — opens lightbox on tap
      const bigPlay = document.createElement('div');
      bigPlay.style.cssText = `position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
        background:rgba(0,0,0,0.18);cursor:pointer;`;
      bigPlay.innerHTML = `<div style="width:48px;height:48px;background:rgba(255,255,255,0.85);border-radius:50%;
        display:flex;align-items:center;justify-content:center;">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="#111"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </div>`;
      div.appendChild(bigPlay);

      bigPlay.addEventListener('click', () => openLightbox(filledIdx));
      div.addEventListener('click', () => openLightbox(filledIdx));

    } else {
      const ph = document.createElement('div');
      ph.className = 'placeholder';
      ph.innerHTML = `<svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>`;
      div.appendChild(ph);
    }

    const lbl = document.createElement('span');
    lbl.className = 'slot-label';
    lbl.textContent = String(slotIndex + 1).padStart(3, '0');
    div.appendChild(lbl);

    return div;
  }

  const feed = document.getElementById('feed');
  let i = 0;
  while (i < order.length) {
    const remaining = order.length - i;
    const goSingle = remaining === 1 || Math.random() < 0.3;
    const row = document.createElement('div');
    if (goSingle) {
      row.className = 'row single';
      row.appendChild(makeTile(order[i]));
      i += 1;
    } else {
      row.className = 'row double';
      const t1 = makeTile(order[i]);
      const t2 = makeTile(order[i + 1]);
      if (Math.random() < 0.4) t1.classList.add('tall');
      else if (Math.random() < 0.4) t2.classList.add('tall');
      row.appendChild(t1);
      row.appendChild(t2);
      i += 2;
    }
    feed.appendChild(row);
  }
</script>
</body>
</html>
