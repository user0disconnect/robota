<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grid</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    max-width: 390px;
    margin: 0 auto;
    min-height: 100vh;
  }

  /* ── Age gate overlay ── */
  #gate {
    position: fixed;
    inset: 0;
    background: #fff;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 32px;
  }

  .gate-card {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  .gate-icon {
    width: 56px;
    height: 56px;
    background: #f2f2f2;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .gate-icon svg {
    width: 26px;
    height: 26px;
    stroke: #555;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .gate-text {
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .gate-text h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.4px;
    color: #111;
  }

  .gate-text p {
    font-size: 14px;
    color: #888;
    line-height: 1.5;
  }

  .gate-checkbox-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    width: 100%;
    cursor: pointer;
  }

  .gate-checkbox-row input[type="checkbox"] {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    margin-top: 1px;
    accent-color: #111;
    cursor: pointer;
  }

  .gate-checkbox-row label {
    font-size: 14px;
    color: #444;
    line-height: 1.5;
    cursor: pointer;
  }

  .gate-btn {
    width: 100%;
    padding: 15px;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.2px;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .gate-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .gate-btn:not(:disabled):active {
    opacity: 0.75;
  }

  .gate-error {
    font-size: 12px;
    color: #c0392b;
    text-align: center;
    min-height: 16px;
  }

  /* ── Main content (hidden until gate passed) ── */
  #app { display: none; }

  .feed {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .row {
    display: flex;
    gap: 14px;
  }

  .tile {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #e8e8e8;
    border-radius: 12px;
  }

  .tile img,
  .tile video {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .row.single .tile { height: 320px; }
  .row.double .tile { height: 220px; }
  .row.double .tile.tall { height: 260px; align-self: flex-start; }

  .badge {
    position: absolute;
    top: 9px;
    right: 9px;
    background: rgba(0,0,0,0.42);
    border-radius: 6px;
    padding: 3px 7px 3px 6px;
    display: flex;
    align-items: center;
    gap: 4px;
    pointer-events: none;
    backdrop-filter: blur(4px);
  }

  .badge svg { width: 9px; height: 9px; fill: #fff; flex-shrink: 0; }
  .badge span { font-size: 10px; color: #fff; font-weight: 600; letter-spacing: 0.04em; }

  .duration {
    position: absolute;
    bottom: 9px;
    right: 9px;
    font-size: 11px;
    font-weight: 600;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    pointer-events: none;
  }
</style>
</head>
<body>

<!-- Age gate -->
<div id="gate">
  <div class="gate-card">
    <div class="gate-icon">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    <div class="gate-text">
      <h1>Age Verification</h1>
      <p>This content is intended for adults only. Please confirm your age before continuing.</p>
    </div>
    <label class="gate-checkbox-row">
      <input type="checkbox" id="ageCheck">
      <label for="ageCheck">I confirm that I am 18 years of age or older</label>
    </label>
    <div class="gate-error" id="gateError"></div>
    <button class="gate-btn" id="gateBtn" disabled>Enter</button>
  </div>
</div>

<!-- Main app -->
<div id="app">
  <div class="feed" id="feed"></div>
</div>

<script>
  /* ── Age gate logic ── */
  const check = document.getElementById('ageCheck');
  const btn   = document.getElementById('gateBtn');
  const err   = document.getElementById('gateError');

  check.addEventListener('change', () => {
    btn.disabled = !check.checked;
    err.textContent = '';
  });

  btn.addEventListener('click', () => {
    if (!check.checked) {
      err.textContent = 'Please confirm you are 18 or older.';
      return;
    }
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  });

  /* ── Media grid ── */
  const PHOTOS = [
    '1506905925346-21bda4d32df4',
    '1493246507139-91e8fad9978e',
    '1470770903676-69b98201ea1c',
    '1501854140801-50d01698950b',
    '1518173946687-a4c8892bbd9f',
    '1469474968028-56623f02e42e',
    '1447752875215-b2761acb3c5d',
    '1433086966358-54859d0ed716',
    '1475924156734-496f6cac6ec1',
    '1468276311594-df7cb65d8df6',
    '1414609245224-aea2569f9932',
    '1504701954957-2010ec3bcec1',
    '1508739773434-c26b3d09e071',
    '1492684223066-81342ee5ff30',
    '1500534314209-a157d0f73d57',
    '1519681393784-d120267933ba',
    '1494500764479-0c8f2919a3d8',
    '1476514525535-07fb3b4ae5f1',
    '1448375240586-882707db888b',
    '1477959858617-67f85cf4f1df',
    '1507003211169-0a1dd7228f2d',
    '1438761681033-6461ffad8d80',
  ];

  const VIDEOS = [
    { src: 'https://www.w3schools.com/html/mov_baa.mp4', dur: '0:06' },
    { src: 'https://www.w3schools.com/html/movie.mp4',   dur: '0:10' },
  ];

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function makeTile(item) {
    const div = document.createElement('div');
    div.className = 'tile';
    if (item.kind === 'photo') {
      const img = document.createElement('img');
      img.src = `https://images.unsplash.com/photo-${item.id}?auto=format&fit=crop&w=600&q=80`;
      img.loading = 'lazy';
      div.appendChild(img);
    } else {
      const vid = document.createElement('video');
      vid.src = item.src;
      vid.autoplay = true;
      vid.muted = true;
      vid.loop = true;
      vid.playsInline = true;
      div.appendChild(vid);
      const badge = document.createElement('div');
      badge.className = 'badge';
      badge.innerHTML = `<svg viewBox="0 0 24 24"><path d="M5 3l14 9-14 9V3z"/></svg><span>Video</span>`;
      div.appendChild(badge);
      const dur = document.createElement('span');
      dur.className = 'duration';
      dur.textContent = item.dur;
      div.appendChild(dur);
    }
    return div;
  }

  const items = shuffle([
    ...PHOTOS.map(id => ({ kind: 'photo', id })),
    ...VIDEOS.map(v => ({ kind: 'video', ...v }))
  ]);

  const feed = document.getElementById('feed');
  let i = 0;
  while (i < items.length) {
    const remaining = items.length - i;
    const goSingle = remaining === 1 || Math.random() < 0.3;
    const row = document.createElement('div');
    if (goSingle) {
      row.className = 'row single';
      row.appendChild(makeTile(items[i]));
      i += 1;
    } else {
      row.className = 'row double';
      const t1 = makeTile(items[i]);
      const t2 = makeTile(items[i + 1]);
      if (Math.random() < 0.4) t1.classList.add('tall');
      else if (Math.random() < 0.4) t2.classList.add('tall');
      row.appendChild(t1);
      row.appendChild(t2);
      i += 2;
    }
    feed.appendChild(row);
  }
</script>
</body>
</html>
