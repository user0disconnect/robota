<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>webangelboy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    max-width: 390px;
    margin: 0 auto;
    min-height: 100vh;
  }

  /* ── Age gate ── */
   #gate {
    position: fixed;
    inset: 0;
    background: #fff;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 32px;
    overflow: hidden;
  }

  .gate-flowers {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
 
 .gate-flowers span {
    position: absolute;
    image-rendering: pixelated;
    user-select: none;
    animation: slowDrift ease-in-out infinite alternate, blurPulse ease-in-out infinite alternate;
  }
 
  @keyframes slowDrift {
    0%   { transform: translateX(0px)       translateY(0px)      rotate(var(--r)); }
    100% { transform: translateX(var(--dx)) translateY(var(--dy)) rotate(var(--r)); }
  }
 
  @keyframes blurPulse {
    0%   { filter: blur(var(--blur1)) saturate(1.8); opacity: var(--op1); }
    100% { filter: blur(var(--blur2)) saturate(1.4); opacity: var(--op2); }
  }
 
  .gate-card {
    position: relative;
    z-index: 1;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    background: rgba(255, 255, 255, 0.55);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.8);
    border-radius: 28px;
    padding: 36px 28px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.06);
  }
 
  .gate-icon {
    width: 80px;
    height: 80px;
    background: transparent;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
 
  .gate-icon svg {
    width: 80px;
    height: 80px;
  }
 
  .gate-text {
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
 
  .gate-text h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.4px;
    color: #111;
  }
 
  .gate-text p {
    font-size: 14px;
    color: #888;
    line-height: 1.5;
  }
 
  .gate-checkbox-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    width: 100%;
    cursor: pointer;
  }
 
  .gate-checkbox-row input[type="checkbox"] {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    margin-top: 1px;
    accent-color: #111;
    cursor: pointer;
  }
 
  .gate-checkbox-row label {
    font-size: 14px;
    color: #444;
    line-height: 1.5;
    cursor: pointer;
  }
 
  .gate-btn {
    width: 100%;
    padding: 15px;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.2px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
 
  .gate-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .gate-btn:not(:disabled):active { opacity: 0.75; }
 
  .gate-error {
    font-size: 12px;
    color: #c0392b;
    text-align: center;
    min-height: 16px;
  }
  /* ── App ── */
  #app { display: none; }

  .feed {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .row { display: flex; gap: 14px; }

  .tile {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #e8e8e8;
    border-radius: 12px;
  }

  .tile video {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Placeholder shown while src not yet set */
  .tile .placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #ebebeb;
  }

  .tile .placeholder svg {
    width: 28px;
    height: 28px;
    stroke: #bbb;
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .row.single .tile { height: 320px; }
  .row.double .tile { height: 220px; }
  .row.double .tile.tall { height: 260px; align-self: flex-start; }

  /* Slot number label */
  .slot-label {
    position: absolute;
    bottom: 9px;
    left: 9px;
    font-size: 10px;
    font-weight: 600;
    color: rgba(255,255,255,0.75);
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    pointer-events: none;
  }

  /* ── Video player overlay ── */
  .player-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    cursor: pointer;
    background: linear-gradient(to top, rgba(0,0,0,0.45) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .tile:hover .player-overlay,
  .tile.controls-visible .player-overlay {
    opacity: 1;
  }

  .player-controls {
    padding: 8px 10px 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .player-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .btn-playpause {
    width: 32px;
    height: 32px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    border: none;
    cursor: pointer;
    flex-shrink: 0;
  }

  .btn-playpause svg {
    width: 14px;
    height: 14px;
    fill: #fff;
    stroke: none;
  }

  .time-label {
    font-size: 10px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.04em;
  }

  /* Progress bar */
  .progress-wrap {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.3);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: #fff;
    border-radius: 2px;
    width: 0%;
    pointer-events: none;
  }

  /* ── Lightbox carousel ── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 200;
    touch-action: pan-y;
  }

  #lightbox.open { display: flex; align-items: center; }

  .lb-track {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .lb-slide {
    flex: 0 0 100%;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .lb-slide video {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .lb-close {
    position: fixed;
    top: 18px;
    right: 18px;
    z-index: 210;
    width: 36px;
    height: 36px;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(6px);
  }

  .lb-close svg {
    width: 16px;
    height: 16px;
    stroke: #fff;
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
  }

  .lb-counter {
    position: fixed;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.04em;
    z-index: 210;
    pointer-events: none;
  }

  /* Lightbox player controls */
  .lb-controls {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 210;
    padding: 12px 20px 40px;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
    display: flex;
    flex-direction: column;
    gap: 10px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  #lightbox.show-controls .lb-controls { opacity: 1; }

  .lb-controls-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .lb-playpause {
    width: 44px;
    height: 44px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: none;
    backdrop-filter: blur(4px);
  }

  .lb-playpause svg { width: 18px; height: 18px; fill: #fff; }

  .lb-time {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.8);
    letter-spacing: 0.04em;
  }

  .lb-progress-wrap {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
    cursor: pointer;
  }

  .lb-progress-fill {
    height: 100%;
    background: #fff;
    border-radius: 2px;
    width: 0%;
    pointer-events: none;
  }

</style>
</head>

<script>
  /* ── Gate flowers ── */
  const flowers = ['🌸','🌺','🌼','🌻','🌷','💐','🪷','🌹','🤍','❤️','💗','💓','💕'];
  const gateFlowers = document.getElementById('gateFlowers');
  // Evenly distribute flowers in a 4×6 grid with larger random offset
  const cols = 4, rows = 7;
  const flowerList = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      flowerList.push({
        x: (c / cols * 100) + (100 / cols / 2) + (Math.random() * 16 - 8),
        y: (r / rows * 100) + (100 / rows / 2) + (Math.random() * 16 - 8),
      });
    }
  }
  // Shuffle
  for (let k = flowerList.length - 1; k > 0; k--) {
    const j = Math.floor(Math.random() * (k + 1));
    [flowerList[k], flowerList[j]] = [flowerList[j], flowerList[k]];
  }

  flowerList.forEach(({ x, y }, idx) => {
    const el = document.createElement('span');
    el.textContent = flowers[Math.floor(Math.random() * flowers.length)];
    const rot = Math.round(Math.random() * 360);
    el.style.left = x + '%';
    el.style.top  = y + '%';
    el.style.fontSize = (42 + Math.random() * 50) + 'px';
    el.style.filter = `blur(${3 + Math.random() * 3}px) saturate(1.8)`;
    el.style.opacity = 0.75 + Math.random() * 0.25;
    el.style.setProperty('--r', rot + 'deg');
    el.style.animationDuration = (4 + Math.random() * 5) + 's';
    el.style.animationDelay = (-Math.random() * 6) + 's';
    gateFlowers.appendChild(el);
  });

  // 2 big accent flowers
  [{x: 5, y: 8}, {x: 82, y: 78}].forEach(({x, y}) => {
    const el = document.createElement('span');
    el.textContent = flowers[Math.floor(Math.random() * flowers.length)];

    el.style.top  = y + '%';
    el.style.fontSize = (130 + Math.random() * 60) + 'px';
    el.style.filter = `blur(${4 + Math.random() * 3}px) saturate(2)`;

      const ua = navigator.userAgent;
      if (/Chrome/i.test(ua) && !/Edg/i.test(ua)) return 'Chrome';
      if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) return 'Safari';
      if (/Firefox/i.test(ua)) return 'Firefox';
      if (/Edg/i.test(ua)) return 'Edge';

    /* 087 */ 'https://res.cloudinary.com/dw5ovtiwp/video/upload/v1780503512/%D0%B7%D0%B0%D0%BC8_gv20wu.mp4',
    /* 088 */ 'https://res.cloudinary.com/dw5ovtiwp/video/upload/v1780503511/%D0%B7%D0%B0%D0%BC13_iuthei.mp4',
    /* 089 */ 'https://res.cloudinary.com/dw5ovtiwp/video/upload/v1780503511/%D0%B7%D0%B0%D0%BC12_drfnnx.mp4',
    /* 090 */ 'https://res.cloudinary.com/dw5ovtiwp/video/upload/v1780503510/%D0%B7%D0%B0%D0%BC11_p1kq1s.mp4',
    /* 091 */ 'https://res.cloudinary.com/dw5ovtiwp/video/upload/v1780503510/%D0%B7%D0%B0%D0%BC10_efoktb.mp4',
    /* 092 */ 'https://res.cloudinary.com/dw5ovtiwp/video/upload/v1780503506/%D0%B7%D0%B0%D0%BC3_s6txrm.mp4',
    /* 093 */ 'https://res.cloudinary.com/dw5ovtiwp/video/upload/v1780503506/%D0%B7%D0%B0%D0%BC1_tmzh3o.mp4',
    /* 094 */ 'https://res.cloudinary.com/dw5ovtiwp/video/upload/v1780503504/%D0%B7%D0%B0%D0%BC7_u1xloq.mp4',
    /* 095 */ 'https://res.cloudinary.com/dw5ovtiwp/video/upload/v1780503503/%D0%B7%D0%B0%D0%BC2_ernxzx.mp4',
    /* 096 */ 'https://res.cloudinary.com/dw5ovtiwp/video/upload/v1780503499/%D0%B7%D0%B0%D0%BC6_u1ivkc.mp4',
    /* 097 */ 'https://res.cloudinary.com/dw5ovtiwp/video/upload/v1780503499/%D0%B7%D0%B0%D0%BC4_l6em3s.mp4',
    /* 098 */ 'https://res.cloudinary.com/dw5ovtiwp/video/upload/v1780503497/%D0%B7%D0%B0%D0%BC5_mh104d.mp4',
    /* 099 */ '',
  ];

  // Only filled slots go into carousel
  const filledSrcs = SRCS.map((s, i) => ({ src: s, index: i })).filter(x => x.src);

  /* ── Lightbox — on-demand slides ── */
  const lightbox       = document.getElementById('lightbox');
  const lbTrack        = document.getElementById('lbTrack');
  const lbClose        = document.getElementById('lbClose');
  const lbCounter      = document.getElementById('lbCounter');
  const lbPlayBtn      = document.getElementById('lbPlayBtn');
  const lbTime         = document.getElementById('lbTime');
  const lbProgressWrap = document.getElementById('lbProgressWrap');
  const lbProgressFill = document.getElementById('lbProgressFill');

  let lbIndex = 0;
  let lbHideTimer;
  // Cache of created slide elements keyed by filledSrc index
  const lbSlideCache = {};

  function getOrCreateSlide(idx) {
    if (lbSlideCache[idx]) return lbSlideCache[idx];
    const { src } = filledSrcs[idx];
    const slide = document.createElement('div');
    slide.className = 'lb-slide';
    slide.style.cssText = `position:absolute;top:0;left:${idx * 100}%;width:100%;height:100%;display:flex;align-items:center;justify-content:center;`;
    const vid = document.createElement('video');
    vid.src = src;
    vid.loop = true;
    vid.muted = true;
    vid.playsInline = true;
    vid.preload = 'metadata';
    vid.style.cssText = 'width:100%;height:100%;object-fit:contain;';
    vid.addEventListener('timeupdate', () => {
      if (idx !== lbIndex || !vid.duration) return;
      lbProgressFill.style.width = (vid.currentTime / vid.duration * 100) + '%';
      const s = Math.floor(vid.currentTime);
      lbTime.textContent = Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
    });
    slide.appendChild(vid);
    lbTrack.appendChild(slide);
    lbSlideCache[idx] = { slide, vid };
    return lbSlideCache[idx];
  }

  function lbCurrentVid() {
    return lbSlideCache[lbIndex] ? lbSlideCache[lbIndex].vid : null;
  }

  function lbGoTo(idx, animate = true) {
    lbIndex = Math.max(0, Math.min(idx, filledSrcs.length - 1));
    // Pre-create current + neighbours
    [-1, 0, 1].forEach(offset => {
      const i = lbIndex + offset;
      if (i >= 0 && i < filledSrcs.length) getOrCreateSlide(i);
    });
    lbTrack.style.transition = animate ? 'transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94)' : 'none';
    lbTrack.style.transform = `translateX(-${lbIndex * 100}%)`;
    lbCounter.textContent = `${lbIndex + 1} / ${filledSrcs.length}`;
    // Pause neighbours, play current
    Object.entries(lbSlideCache).forEach(([i, { vid }]) => {
      if (parseInt(i) !== lbIndex) vid.pause();
    });
    const cur = lbCurrentVid();
    if (cur) cur.play().catch(() => {});
    lbUpdateControls();
  }

  function lbUpdateControls() {
    const cur = lbCurrentVid();
    if (!cur) return;
    lbPlayBtn.innerHTML = cur.paused
      ? `<svg viewBox="0 0 24 24" fill="#fff"><polygon points="5 3 19 12 5 21 5 3"/></svg>`
      : `<svg viewBox="0 0 24 24" fill="#fff"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;
  }

  function lbShowControls() {
    lightbox.classList.add('show-controls');
    clearTimeout(lbHideTimer);
    lbHideTimer = setTimeout(() => lightbox.classList.remove('show-controls'), 2500);
  }

  function openLightbox(filledIdx) {
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
    lbGoTo(filledIdx, false);
    lbShowControls();
  }

  function closeLightbox() {
    // Pause all cached videos
    Object.values(lbSlideCache).forEach(({ vid }) => vid.pause());
    lightbox.classList.remove('open', 'show-controls');
    document.body.style.overflow = '';
  }

  lbClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox || e.target.tagName === 'VIDEO') lbShowControls();
  });
  lbPlayBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const cur = lbCurrentVid();
    if (!cur) return;
    cur.paused ? cur.play() : cur.pause();
    lbUpdateControls();
    lbShowControls();
  });
  lbProgressWrap.addEventListener('click', (e) => {
    e.stopPropagation();
    const cur = lbCurrentVid();
    if (!cur || !cur.duration) return;
    const rect = lbProgressWrap.getBoundingClientRect();
    cur.currentTime = ((e.clientX - rect.left) / rect.width) * cur.duration;
    lbShowControls();
  });

  /* ── Swipe ── */
  let swipeStartX = 0, swipeStartY = 0, swipeDx = 0, isHorizontal = null;
  lightbox.addEventListener('touchstart', (e) => {
    swipeStartX = e.touches[0].clientX;
    swipeStartY = e.touches[0].clientY;
    swipeDx = 0; isHorizontal = null;
    lbTrack.style.transition = 'none';
  }, { passive: true });
  lightbox.addEventListener('touchmove', (e) => {
    const dx = e.touches[0].clientX - swipeStartX;
    const dy = e.touches[0].clientY - swipeStartY;
    if (isHorizontal === null && (Math.abs(dx) > 5 || Math.abs(dy) > 5))
      isHorizontal = Math.abs(dx) > Math.abs(dy);
    if (isHorizontal) {
      e.preventDefault();
      swipeDx = dx;
      lbTrack.style.transform = `translateX(calc(-${lbIndex * 100}% + ${swipeDx}px))`;
    }
  }, { passive: false });
  lightbox.addEventListener('touchend', () => {
    if (isHorizontal) {
      if (swipeDx < -50 && lbIndex < filledSrcs.length - 1) lbGoTo(lbIndex + 1);
      else if (swipeDx > 50 && lbIndex > 0) lbGoTo(lbIndex - 1);
      else {
        lbTrack.style.transition = 'transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94)';
        lbTrack.style.transform = `translateX(-${lbIndex * 100}%)`;
      }
    } else lbShowControls();
    isHorizontal = null; swipeDx = 0;
  });

  /* ── Lazy poster loader ── */
  const posterObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const tile = entry.target;
      const vid = tile.querySelector('video[data-poster]');
      if (vid) {
        vid.poster = vid.dataset.poster;
        vid.src = vid.dataset.src;
        delete vid.dataset.poster;
        delete vid.dataset.src;
      }
      posterObserver.unobserve(tile);
    });
  }, { rootMargin: '300px' });

  /* ── Infinite scroll grid ── */
  const order = [...Array(98).keys()];
  const BATCH = 20;
  let gridCursor = 0;
  const feed = document.getElementById('feed');

  function makeTile(slotIndex) {
    const src = SRCS[slotIndex];
    const div = document.createElement('div');
    div.className = 'tile';
    if (src) {
      const filledIdx = filledSrcs.findIndex(x => x.index === slotIndex);
      const thumb = document.createElement('video');
      thumb.muted = true; thumb.loop = true;
      thumb.playsInline = true; thumb.preload = 'none';
      const poster = src
        .replace('/video/upload/', '/video/upload/so_0,q_auto,f_jpg,w_400/')
        .replace(/\.(mp4|mov|webm)$/i, '.jpg');
      thumb.dataset.src = src;
      thumb.dataset.poster = poster;
      div.appendChild(thumb);
      posterObserver.observe(div);
      const bigPlay = document.createElement('div');
      bigPlay.style.cssText = `position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.18);cursor:pointer;`;
      bigPlay.innerHTML = `<div style="width:48px;height:48px;background:rgba(255,255,255,0.85);border-radius:50%;display:flex;align-items:center;justify-content:center;"><svg viewBox="0 0 24 24" width="20" height="20" fill="#111"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>`;
      div.appendChild(bigPlay);
      bigPlay.addEventListener('click', () => openLightbox(filledIdx));
      div.addEventListener('click', () => openLightbox(filledIdx));
    } else {
      const ph = document.createElement('div');
      ph.className = 'placeholder';
      ph.innerHTML = `<svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>`;
      div.appendChild(ph);
    }
    const lbl = document.createElement('span');
    lbl.className = 'slot-label';
    lbl.textContent = String(slotIndex + 1).padStart(3, '0');
    div.appendChild(lbl);
    return div;
  }

  function loadBatch() {
    const end = Math.min(gridCursor + BATCH, order.length);
    let i = gridCursor;
    while (i < end) {
      const remaining = end - i;
      const goSingle = remaining === 1 || Math.random() < 0.3;
      const row = document.createElement('div');
      if (goSingle) {
        row.className = 'row single';
        row.appendChild(makeTile(order[i]));
        i += 1;
      } else {
        row.className = 'row double';
        const t1 = makeTile(order[i]);
        const t2 = makeTile(order[i + 1]);
        if (Math.random() < 0.4) t1.classList.add('tall');
        else if (Math.random() < 0.4) t2.classList.add('tall');
        row.appendChild(t1);
        row.appendChild(t2);
        i += 2;
      }
      feed.appendChild(row);
    }
    gridCursor = i;
  }

  // Load first batch immediately
  loadBatch();

  // Load more when user nears bottom
  const scrollObserver = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting && gridCursor < order.length) loadBatch();
  }, { rootMargin: '400px' });

  // Sentinel element at bottom of feed
  const sentinel = document.createElement('div');
  sentinel.style.height = '1px';
  feed.appendChild(sentinel);
  scrollObserver.observe(sentinel);
</script>
